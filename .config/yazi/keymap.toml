#:schema https://yazi-rs.github.io/schemas/keymap.json

[[mgr.prepend_keymap]]
on = "M"
run = "plugin mount"

[[mgr.prepend_keymap]]
on = "F"
run = "plugin smart-filter"
desc = "Smart filter"

[[mgr.prepend_keymap]]
on = "H"
run = "plugin duckdb -1"
desc = "Scroll one column to the left"

[[mgr.prepend_keymap]]
on = "L"
run = "plugin duckdb +1"
desc = "Scroll one column to the right"

[[mgr.prepend_keymap]]
on = ["g", "o"]
run = "plugin duckdb -open"
desc = "open with duckdb"

[[mgr.prepend_keymap]]
on = ["g", "u"]
run = "plugin duckdb -ui"
desc = "open with duckdb ui"

[[mgr.prepend_keymap]]
on = ["C"]
run = "plugin ouch tar.gz"
desc = "Compress with ouch"

[[mgr.prepend_keymap]]
on = ["R", "o"]
run = "plugin recycle-bin -- open"
desc = "Open Trash"

[[mgr.prepend_keymap]]
on = ["R", "e"]
run = "plugin recycle-bin -- empty"
desc = "Empty Trash"

[[mgr.prepend_keymap]]
on = ["R", "D"]
run = "plugin recycle-bin -- emptyDays"
desc = "Empty by days deleted"

[[mgr.prepend_keymap]]
on = ["R", "d"]
run = "plugin recycle-bin -- delete"
desc = "Delete from Trash"

[[mgr.prepend_keymap]]
on = ["R", "r"]
run = "plugin recycle-bin -- restore"
desc = "Restore from Trash"

[[mgr.prepend_keymap]]
on = [":"]
run = "plugin command"
desc = "Open command palette"
