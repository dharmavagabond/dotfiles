osc=no
border=no

input-builtin-bindings=no

save-position-on-quit=yes
watch-later-options=start,speed,volume,audio-delay,sub-delay,sub-speed,sub-pos,sub-visibility,sub-scale

user-agent="Mozilla/5.0 (X11; Linux x86_64; rv:115.0) Gecko/20100101 Firefox/115.0"

# Display
icc-profile-auto=yes

# Video
geometry=50%:50%
autofit-larger=85%x85%
target-colorspace-hint=auto
gpu-api=vulkan
vo=gpu-next,
hwdec=vulkan

# Audio
alang=esp,jpn,eng
audio-file-auto=fuzzy

# Subtitle
slang=en,es
sub-ass-override=strip
sub-auto=fuzzy
sub-font="Rosario"
sub-bold=yes
sub-font-size=55
sub-color="#faf4ed" # rose-pine-dawn @base
sub-outline-color="#0b0b0d"
sub-margin-x=125
sub-outline-size=3

# Cache
cache=yes
cache-pause=no

demuxer-max-bytes=500M
demuxer-max-back-bytes=100M

# IPC
input-ipc-server=/tmp/mpv.sock

# Profiles
[default]
# https://github.com/hyprwm/Hyprland/discussions/11341
inverse-tone-mapping
target-trc=pq
target-prim=bt.2020
target-peak=400
tone-mapping=bt.2446a

[no-scripts]
profile-desc="desactiva los scripts"
load-scripts=no

[mpvpaper]
vo=libmpv
target-trc=auto
target-prim=auto
target-peak=auto
tone-mapping=auto
loop=4
loop-playlist=inf
cache=no
no-audio
shuffle
