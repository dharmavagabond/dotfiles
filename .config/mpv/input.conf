# Mouse
MBTN_LEFT     ignore
MBTN_LEFT_DBL cycle fullscreen
MBTN_RIGHT    cycle pause
MBTN_BACK     playlist-prev
MBTN_FORWARD  playlist-next

# Volume
k add volume  5
j add volume -5
Shift+k add volume 1
Shift+j add volume -1

# Seeking
h no-osd seek -3 exact
l no-osd seek  3 exact
Shift+h seek -10
Shift+l seek  10
, frame-back-step
. frame-step

# Speed
[ multiply speed 1/1.1
] multiply speed 1.1
{ multiply speed 0.5
} multiply speed 2.0
BS set speed 1.0
Shift+BS set speed 0.26

# Subtitle
Alt+u cycle sub
Alt+i cycle sub down
Shift+u add sub-pos -5
Shift+i add sub-pos +5
Ctrl+- add sub-scale +0.1
Ctrl+= add sub-scale -0.1

# Playlist
< playlist-prev
> playlist-next

# Misc
q quit
` script-binding console/enable
m cycle mute
v script-binding stats/display-stats-toggle
t cycle ontop
a cycle-values video-aspect-override "16:9" "4:3" "2.35:1" "-1"
space cycle pause
s cycle sub-visibility
S cycle secondary-sub-visibility
r cycle video
R cycle audio
c screenshot video
C screenshot

# Resolution
Alt+1 cycle-values video-unscaled "no" "yes"

1     add contrast 1
!     add contrast -1
2     add brightness 1
@     add brightness -1
3     add gamma 1
SHARP add gamma -1
4     add saturation 1
$     add saturation -1

# Filters
Ctrl+0 no-osd change-list glsl-shaders clr ""; show-text "GLSL shaders cleared"

